<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    #globeViz {
      position: fixed;
      inset: 0;
      background: transparent;
    }

    #tooltip {
      position: fixed;
      display: none;
      z-index: 9999;
      pointer-events: none;
      background: rgba(7, 11, 20, 0.92);
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: translate(12px, -50%);
    }

    #errorBox {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      display: none;
      max-width: 380px;
      background: rgba(130, 24, 24, 0.96);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #marketFilter {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      padding: 10px 12px;
      min-width: 220px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255,255,255,0.95);
      color: #111;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      outline: none;
    }
  </style>
</head>
<body>
  <select id="marketFilter">
    <option value="all">All Marketplaces</option>
    <option value="Alibaba">Alibaba</option>
    <option value="Aliexpress">Aliexpress</option>
    <option value="Allegro">Allegro</option>
    <option value="Amazon">Amazon</option>
    <option value="Americanas">Americanas</option>
    <option value="Best Buy">Best Buy</option>
    <option value="Bol">Bol</option>
    <option value="DHGate">DHGate</option>
    <option value="eBay">eBay</option>
    <option value="Etsy">Etsy</option>
    <option value="Lazada">Lazada</option>
    <option value="Made-in-China">Made-in-China</option>
    <option value="Mercado Libre">Mercado Libre</option>
    <option value="NewEgg">NewEgg</option>
    <option value="Tokopedia">Tokopedia</option>

    <option value="Wish">Wish</option>

  <div id="globeViz"></div>
  <div id="tooltip"></div>
  <div id="errorBox"></div>

      { name: "Tokopedia", group: "Tokopedia", lat: -6.2088, lng: 106.8456 },

      { name: "Walmart CA", group: "Walmart", lat: 43.6532, lng: -79.3832 },
      { name: "Walmart MX", group: "Walmart", lat: 19.4326, lng: -99.1332 },
      { name: "Walmart US", group: "Walmart", lat: 36.3729, lng: -94.2088 },

      { name: "Wish US", group: "Wish", lat: 37.7749, lng: -122.4194 }
    ];

    const globeEl = document.getElementById('globeViz');
    const tooltip = document.getElementById('tooltip');
    const errorBox = document.getElementById('errorBox');
    const marketFilter = document.getElementById('marketFilter');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      console.error(msg);
    }

    function pointColor(d) {
      return MARKET_COLORS[d.group] || '#ff6b3d';
    }

    function getFilteredData() {
      const selected = marketFilter.value;
      return selected === 'all'
        ? marketplaces
        : marketplaces.filter(item => item.group === selected);
    }

    function startGlobe() {
      if (typeof Globe !== 'function') {
        showError('The globe library did not load.');
        return;
      }

      const globe = new Globe(globeEl)
        .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
        .backgroundColor('rgba(0,0,0,0)')
        .showAtmosphere(true)
        .atmosphereColor('#79c8ff')
        .atmosphereAltitude(0.16)
        .pointsData(getFilteredData())
        .pointLat('lat')
        .pointLng('lng')
        .pointAltitude(0.03)
        .pointRadius(0.36)
        .pointColor(pointColor)
        .pointResolution(18)
        .onPointHover(point => {
          if (point) {
            tooltip.style.display = 'block';
            tooltip.textContent = point.name;
          } else {
            tooltip.style.display = 'none';
          }
        });

      globe.pointOfView({ lat: 18, lng: 10, altitude: 2.05 }, 0);

      const controls = globe.controls();
      controls.autoRotate = true;
      controls.autoRotateSpeed = -0.35;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = false;

      globeEl.addEventListener('mousemove', e => {
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
      });

      globeEl.addEventListener('mouseenter', () => {
        controls.autoRotate = false;
      });

      globeEl.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
        controls.autoRotate = true;
      });

      marketFilter.addEventListener('change', () => {
        const filtered = getFilteredData();
        globe.pointsData(filtered);
        globe.ringsData(filtered);
      });

      function resize() {
        globe.width(window.innerWidth);
        globe.height(window.innerHeight);
      }

      resize();
      window.addEventListener('resize', resize);

      globe
        .ringsData(getFilteredData())
        .ringLat('lat')
        .ringLng('lng')
        .ringColor(d => t => {
          const hex = pointColor(d);
          const rgb = hexToRgb(hex);
          return `rgba(${rgb.r},${rgb.g},${rgb.b},${1 - t})`;
        })
        .ringMaxRadius(3.2)
        .ringPropagationSpeed(0.7)
        .ringRepeatPeriod(1800);
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    window.addEventListener('load', startGlobe);
  </script>

</html>
