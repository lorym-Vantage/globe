<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, #0b1830 0%, #050b16 100%);
    }

    .tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: rgba(10, 14, 24, 0.92);
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.3;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: translate(12px, -50%);
      display: none;
    }

    .legend {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      color: rgba(255,255,255,0.88);
      background: rgba(6, 10, 18, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      max-width: 260px;
    }

    .legend strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="globeViz"></div>
  <div id="tooltip" class="tooltip"></div>

  <div class="legend">
    <strong>Marketplace Coverage</strong>
    Hover a pin to view marketplace names. The globe rotates automatically and pauses while hovered.
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

      { name: "Walmart US", lat: 36.3729, lng: -94.2088 },

      { name: "Wish US", lat: 37.7749, lng: -122.4194 }
    ];

    const tooltip = document.getElementById('tooltip');
    const globeEl = document.getElementById('globeViz');

    const globe = Globe()(globeEl)
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#7cc7ff')
      .atmosphereAltitude(0.18)
      .pointsData(marketplaces)
      .pointLat(d => d.lat)
      .pointLng(d => d.lng)
      .pointAltitude(0.03)
      .pointRadius(0.38)
      .pointColor(() => '#ff6b3d')
      .pointResolution(18)
      .onPointHover(point => {
        if (point) {
          tooltip.style.display = 'block';
          tooltip.textContent = point.name;
        } else {
          tooltip.style.display = 'none';
        }
      });

    globe.pointOfView({ lat: 18, lng: 10, altitude: 2.05 }, 0);

    const controls = globe.controls();
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.35;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 180;
    controls.maxDistance = 320;
    controls.enablePan = false;

    globeEl.addEventListener('mousemove', e => {
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
    });

    globeEl.addEventListener('mouseenter', () => {
      controls.autoRotate = false;
    });

    globeEl.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
      controls.autoRotate = true;
    });

    function resizeGlobe() {
      globe.width(window.innerWidth);
      globe.height(window.innerHeight);
    }

    resizeGlobe();
    window.addEventListener('resize', resizeGlobe);

    // optional arcs glow effect for depth
    globe
      .ringsData(marketplaces)
      .ringLat(d => d.lat)
      .ringLng(d => d.lng)
      .ringColor(() => t => `rgba(255,107,61,${1 - t})`)
      .ringMaxRadius(3.2)
      .ringPropagationSpeed(0.7)
      .ringRepeatPeriod(1800);
  </script>
</body>
</html>
