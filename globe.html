<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Globe</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    /* Container for layout control */
    #globeContainer {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Globe */
    #globeViz {
      position: fixed;
      inset: 0;
      background: transparent;
    }

    /* Dropdown (desktop default = overlay) */
    #marketFilter {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      padding: 10px 12px;
      min-width: 220px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255,255,255,0.95);
      color: #111;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      outline: none;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      display: none;
      z-index: 9999;
      pointer-events: none;
      background: rgba(7, 11, 20, 0.92);
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: translate(12px, -50%);
    }

    /* 🔥 MOBILE FIX */
    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      #globeContainer {
        display: flex;
        flex-direction: column;
        height: auto;
      }

      #marketFilter {
        position: relative;
        top: auto;
        left: auto;
        margin: 16px auto 8px auto;
        width: 90%;
        font-size: 16px;
        padding: 12px;
      }

      #globeViz {
        position: relative;
        width: 100%;
        height: 70vh;
      }
    }
  </style>
</head>

<body>

<div id="globeContainer">

  <select id="marketFilter">
    <option value="all">All Marketplaces</option>
    <option value="Alibaba">Alibaba</option>
    <option value="Aliexpress">Aliexpress</option>
    <option value="Allegro">Allegro</option>
    <option value="Amazon">Amazon</option>
    <option value="Americanas">Americanas</option>
    <option value="Best Buy">Best Buy</option>
    <option value="Bol">Bol</option>
    <option value="DHGate">DHGate</option>
    <option value="eBay">eBay</option>
    <option value="Etsy">Etsy</option>
    <option value="Lazada">Lazada</option>
    <option value="Made-in-China">Made-in-China</option>
    <option value="Mercado Libre">Mercado Libre</option>
    <option value="NewEgg">NewEgg</option>
    <option value="Tokopedia">Tokopedia</option>
    <option value="Walmart">Walmart</option>
    <option value="Wish">Wish</option>
  </select>

  <div id="globeViz"></div>

</div>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>

<script>
const MARKET_COLORS = {
  "Amazon": "#FFB000",
  "eBay": "#86B817",
  "Walmart": "#00A6FB",
  "Etsy": "#FF8C42",
  "Lazada": "#7B61FF",
  "Mercado Libre": "#FFD60A",
  "Alibaba": "#FF7A00"
};

/* keep your existing marketplaces array here */

const globeEl = document.getElementById('globeViz');
const tooltip = document.getElementById('tooltip');
const marketFilter = document.getElementById('marketFilter');

function pointColor(d) {
  return MARKET_COLORS[d.group] || '#ff6b3d';
}

function getFilteredData() {
  const selected = marketFilter.value;
  return selected === 'all'
    ? marketplaces
    : marketplaces.filter(item => item.group === selected);
}

function getDisplayData() {
  const filtered = getFilteredData();
  const counts = new Map();

  return filtered.map(item => {
    const key = `${item.lat},${item.lng}`;
    const index = counts.get(key) || 0;
    counts.set(key, index + 1);

    if (index === 0) return item;

    const angle = index * 0.9;
    const distance = 0.9 + (index * 0.18);

    return {
      ...item,
      lat: item.lat + Math.sin(angle) * distance,
      lng: item.lng + Math.cos(angle) * distance
    };
  });
}

const globe = new Globe(globeEl)
  .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
  .backgroundColor('rgba(0,0,0,0)')
  .pointsData(getDisplayData())
  .pointLat('lat')
  .pointLng('lng')
  .pointAltitude(0.03)
  .pointRadius(0.36)
  .pointColor(pointColor)
  .pointLabel(() => '')
  .onPointHover(point => {
    if (point) {
      tooltip.style.display = 'block';
      tooltip.textContent = point.name;
    } else {
      tooltip.style.display = 'none';
    }
  });

const controls = globe.controls();
controls.autoRotate = true;
controls.autoRotateSpeed = -0.35;

globeEl.addEventListener('mousemove', e => {
  tooltip.style.left = e.clientX + 'px';
  tooltip.style.top = e.clientY + 'px';
});

globeEl.addEventListener('mouseenter', () => {
  controls.autoRotate = false;
});

globeEl.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  controls.autoRotate = true;
});

marketFilter.addEventListener('change', () => {
  const filtered = getDisplayData();
  globe.pointsData(filtered);
});
</script>

</body>
</html>
